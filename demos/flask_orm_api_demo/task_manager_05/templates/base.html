<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager 05 - {% block title %}{% endblock title %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
    <h1>Task Manager 05 (Peewee)</h1>
    
    <nav>
        <a href="{{ url_for('tasks.home') }}">Home</a>
        <a href="{{ url_for('tasks.about') }}">About</a>
        <a href="{{ url_for('tasks.task_list') }}">All Tasks</a>
    </nav>

    <section>
        <header>
            {% block header %}{% endblock header %}
        </header>
        <main>
            {% block content %}<p>No tasks yet.</p>{% endblock content %}
        </main>
    </section>
</body>
</html>
