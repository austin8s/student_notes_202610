{% extends 'base.html' %}

{% block title %}Tags - Task Manager{% endblock %}

{% block content %}
<h1>All Tags</h1>

<ul class="tag-list">
  {% for tag in tags %}
  <li>
    <h3>
      <a href="{{ url_for('tags.tag_detail', tag_id=tag.id) }}">
        <span class="tag">{{ tag.name }}</span>
      </a>
    </h3>
    <p><strong>Tasks:</strong> {{ tag.get_tasks()|list|length }}</p>
  </li>
  {% endfor %}
</ul>
{% endblock %}
