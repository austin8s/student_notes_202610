<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Task Manager{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('main.home') }}">Home</a>
    <a href="{{ url_for('users.list_users') }}">Users</a>
    <a href="{{ url_for('tasks.list_tasks') }}">Tasks</a>
    <a href="{{ url_for('tasks.pending_tasks') }}">Pending</a>
    <a href="{{ url_for('tasks.completed_tasks') }}">Completed</a>
    <a href="{{ url_for('tags.list_tags') }}">Tags</a>
    <a href="{{ url_for('about.about') }}">About</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Task Manager 06 - Flask Peewee Demo</p>
  </footer>
</body>
</html>
