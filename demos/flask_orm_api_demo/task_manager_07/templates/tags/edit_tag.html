{% extends 'base.html' %}

{% block title %}Edit Tag{% endblock %}

{% block content %}
<h1>Edit Tag: {{ tag.name }}</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Tag Name:</label>
        <input type="text" id="name" name="name" value="{{ tag.name }}" required>
    </div>

    <button type="submit" class="btn">Update Tag</button>
    <a href="{{ url_for('tags.tag_detail', tag_id=tag.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
