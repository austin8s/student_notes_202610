{% extends 'base.html' %}

{% block title %}Users{% endblock %}

{% block content %}
<h1>All Users ({{ users|length }})</h1>

<a href="{{ url_for('users.create_user') }}" class="btn">Create New User</a>

<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Tasks</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.tasks|length }}</td>
            <td>
                <a href="{{ url_for('users.user_detail', user_id=user.id) }}" class="btn">View</a>
                <a href="{{ url_for('users.edit_user', user_id=user.id) }}" class="btn">Edit</a>
                <form method="POST" action="{{ url_for('users.delete_user', user_id=user.id) }}" 
                      style="display:inline;" 
                      onsubmit="return confirm('Delete user and all their tasks?');">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
